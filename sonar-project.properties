# =============================================================================
# SonarQube Configuration — EstateWise Monorepo
# =============================================================================
# This file configures SonarQube/SonarCloud analysis for the entire monorepo.
# Supports both self-hosted SonarQube 10+ and SonarCloud.
#
# Usage:
#   make sonar                       # via Makefile
#   sonar-scanner                    # direct CLI
#   docker compose --profile sonar up -d && make sonar  # local SonarQube
#
# Environment variables required:
#   SONAR_TOKEN          — Authentication token
#   SONAR_HOST_URL       — Server URL (default: http://localhost:9000 for local)
# =============================================================================

# ─── Project Identity ─────────────────────────────────────────
sonar.projectKey=estatewise
sonar.projectName=EstateWise
sonar.projectVersion=1.0.0
sonar.organization=hoangsonww

# ─── Source Configuration ─────────────────────────────────────
# Multi-module monorepo: each service is a separate module
sonar.modules=backend,frontend,grpc,mcp,agentic-ai,deployment-control,context-engineering

# Backend module
backend.sonar.projectName=Backend
backend.sonar.sources=src
backend.sonar.tests=tests
backend.sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.spec.ts
backend.sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
backend.sonar.typescript.lcov.reportPaths=coverage/lcov.info
backend.sonar.projectBaseDir=backend

# Frontend module
frontend.sonar.projectName=Frontend
frontend.sonar.sources=pages,components,lib,server,hooks,utils
frontend.sonar.tests=__tests__
frontend.sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/*.test.tsx,**/*.test.ts,**/*.spec.ts
frontend.sonar.test.inclusions=**/*.test.tsx,**/*.test.ts,**/*.spec.ts
frontend.sonar.typescript.lcov.reportPaths=coverage/lcov.info
frontend.sonar.projectBaseDir=frontend

# gRPC module
grpc.sonar.projectName=gRPC Service
grpc.sonar.sources=src
grpc.sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.spec.ts
grpc.sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
grpc.sonar.typescript.lcov.reportPaths=coverage/lcov.info
grpc.sonar.projectBaseDir=grpc

# MCP module
mcp.sonar.projectName=MCP Server
mcp.sonar.sources=src,servers,shared,client,config
mcp.sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts
mcp.sonar.typescript.lcov.reportPaths=coverage/lcov.info
mcp.sonar.projectBaseDir=mcp

# Agentic AI module
agentic-ai.sonar.projectName=Agentic AI
agentic-ai.sonar.sources=src
agentic-ai.sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.spec.ts
agentic-ai.sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
agentic-ai.sonar.typescript.lcov.reportPaths=coverage/lcov.info
agentic-ai.sonar.projectBaseDir=agentic-ai

# Deployment Control module
deployment-control.sonar.projectName=Deployment Control
deployment-control.sonar.sources=src
deployment-control.sonar.exclusions=**/node_modules/**,**/dist/**,**/ui/**
deployment-control.sonar.projectBaseDir=deployment-control

# Context Engineering module
context-engineering.sonar.projectName=Context Engineering
context-engineering.sonar.sources=src
context-engineering.sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts
context-engineering.sonar.typescript.lcov.reportPaths=coverage/lcov.info
context-engineering.sonar.projectBaseDir=context-engineering

# ─── Language & Analysis ──────────────────────────────────────
sonar.language=ts
sonar.sourceEncoding=UTF-8

# ─── Global Exclusions ────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/.next/**,\
  **/out/**,\
  **/coverage/**,\
  **/docs-backend/**,\
  **/docs-frontend/**,\
  **/*.min.js,\
  **/*.min.css,\
  **/helm/**,\
  **/terraform/**,\
  **/kubernetes/**,\
  **/docker/**,\
  **/*.yaml,\
  **/*.yml,\
  **/*.json,\
  **/*.md

# ─── Duplication Detection ────────────────────────────────────
sonar.cpd.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/proto/**

# ─── Quality Gate ─────────────────────────────────────────────
# These thresholds enforce production standards:
#   - New code coverage >= 80%
#   - Duplicated lines on new code < 3%
#   - Maintainability rating: A
#   - Reliability rating: A
#   - Security rating: A
#   - No new blocker/critical issues
# Configure the quality gate in SonarQube/SonarCloud UI to match.

# ─── Security Hotspot Review ──────────────────────────────────
# All security hotspots must be reviewed before merging to main.
# Configured via quality gate in the SonarQube/SonarCloud UI.

# ─── SCM ──────────────────────────────────────────────────────
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# ─── External Issue Reports ───────────────────────────────────
# Import ESLint results if generated:
#   sonar.eslint.reportPaths=backend/eslint-report.json,frontend/eslint-report.json
