apiVersion: v1
kind: ResourceQuota
metadata:
  name: argo-rollouts-quota
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/part-of: estatewise
spec:
  hard:
    pods: "50"
    requests.cpu: "10"
    requests.memory: 16Gi
    limits.cpu: "20"
    limits.memory: 32Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: argo-rollouts-limits
  namespace: argo-rollouts
  labels:
    app.kubernetes.io/part-of: estatewise
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
