apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: estatewise-frontend-preview-hpa
  namespace: estatewise-delivery
  labels:
    app: estatewise-frontend-preview
    app.kubernetes.io/part-of: estatewise
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: estatewise-frontend-preview
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
