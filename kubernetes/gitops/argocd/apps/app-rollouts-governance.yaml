apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: estatewise-argo-rollouts-governance
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: estatewise-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  source:
    repoURL: https://github.com/hoangsonww/EstateWise-Chapel-Hill-Chatbot.git
    targetRevision: main
    path: kubernetes/progressive-delivery/argo-rollouts/platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
