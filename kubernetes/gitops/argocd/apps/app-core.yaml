apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: estatewise-core
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: estatewise-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: estatewise
  source:
    repoURL: https://github.com/hoangsonww/EstateWise-Chapel-Hill-Chatbot.git
    targetRevision: main
    path: kubernetes/overlays/prod-gitops
  syncPolicy:
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: baseline
        pod-security.kubernetes.io/audit: restricted
        pod-security.kubernetes.io/warn: restricted
        app.kubernetes.io/part-of: estatewise
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
  ignoreDifferences:
    - group: argoproj.io
      kind: Rollout
      jsonPointers:
        - /spec/replicas
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /status
