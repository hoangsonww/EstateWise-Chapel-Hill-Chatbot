apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: estatewise-flux-controllers
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: estatewise-gitops
  path: ./kubernetes/gitops/flux/controllers
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: estatewise-flux-flagger
  namespace: flux-system
spec:
  interval: 5m
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: estatewise-flux-controllers
  sourceRef:
    kind: GitRepository
    name: estatewise-gitops
  path: ./kubernetes/progressive-delivery/flagger
  targetNamespace: estatewise-delivery
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: estatewise-frontend-preview
      namespace: estatewise-delivery
    - apiVersion: apps/v1
      kind: Deployment
      name: flagger-loadtester
      namespace: estatewise-delivery
