apiVersion: v1
kind: ResourceQuota
metadata:
  name: flagger-system-quota
  namespace: flagger-system
  labels:
    app.kubernetes.io/part-of: estatewise
spec:
  hard:
    pods: "30"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flagger-system-limits
  namespace: flagger-system
  labels:
    app.kubernetes.io/part-of: estatewise
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
