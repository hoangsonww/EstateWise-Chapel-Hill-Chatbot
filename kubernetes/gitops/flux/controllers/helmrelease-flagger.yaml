apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flux-system
spec:
  releaseName: flagger
  targetNamespace: flagger-system
  interval: 10m
  timeout: 5m
  chart:
    spec:
      chart: flagger
      version: 1.36.1
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flux-system
      interval: 30m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      remediateLastFailure: true
  rollback:
    timeout: 5m
    cleanupOnFail: true
    recreate: true
  values:
    crd:
      create: true
    meshProvider: kubernetes
    metricsServer: http://prometheus.monitoring.svc.cluster.local:9090
    prometheus:
      install: false
    rbac:
      create: true
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
