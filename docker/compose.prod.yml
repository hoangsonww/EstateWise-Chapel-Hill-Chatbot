name: estatewise-prod

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: estatewise
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://localhost:27017/admin", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - estatewise

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/estatewise}
      NEO4J_ENABLE: ${NEO4J_ENABLE:-false}
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: "8126"
      DD_SERVICE: estatewise-backend
      DD_ENV: production
      DD_VERSION: ${BACKEND_VERSION:-latest}
      DD_LOGS_INJECTION: "true"
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3001"
    restart: unless-stopped
    labels:
      com.datadoghq.ad.check_names: '["http_check"]'
      com.datadoghq.ad.init_configs: "[{}]"
      com.datadoghq.ad.instances: '[{"name":"backend-health","url":"http://%%host%%:3001/health","timeout":5}]'
      com.datadoghq.ad.logs: '[{"source":"nodejs","service":"estatewise-backend"}]'
    networks:
      - estatewise

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://backend:3001}
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: "8126"
      DD_SERVICE: estatewise-frontend
      DD_ENV: production
      DD_VERSION: ${FRONTEND_VERSION:-latest}
      DD_LOGS_INJECTION: "true"
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source":"nextjs","service":"estatewise-frontend"}]'
    networks:
      - estatewise

  nginx:
    build:
      context: ..
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - frontend
      - backend
    ports:
      - "${NGINX_PORT:-80}:80"
    restart: unless-stopped
    networks:
      - estatewise

  agentic-ai:
    build:
      context: ..
      dockerfile: docker/agentic-ai.Dockerfile
    profiles: ["agentic"]
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 4318
      API_BASE_URL: ${API_BASE_URL:-http://backend:3001}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://frontend:3000}
      MCP_CACHE_TTL_MS: ${MCP_CACHE_TTL_MS:-30000}
      MCP_CACHE_MAX: ${MCP_CACHE_MAX:-200}
      MCP_DEBUG: ${MCP_DEBUG:-false}
      NEO4J_ENABLE: ${NEO4J_ENABLE:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DAILY_BUDGET_USD: ${DAILY_BUDGET_USD:-10}
      MONTHLY_BUDGET_USD: ${MONTHLY_BUDGET_USD:-200}
      PER_REQUEST_MAX_USD: ${PER_REQUEST_MAX_USD:-0.50}
      DEFAULT_AGENT_TIMEOUT_MS: ${DEFAULT_AGENT_TIMEOUT_MS:-60000}
      MAX_AGENT_ITERATIONS: ${MAX_AGENT_ITERATIONS:-10}
      MAX_CONCURRENT_AGENTS: ${MAX_CONCURRENT_AGENTS:-3}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      DD_AGENT_HOST: datadog-agent
      DD_TRACE_AGENT_PORT: "8126"
      DD_SERVICE: estatewise-agentic-ai
      DD_ENV: production
      DD_VERSION: ${AGENTIC_VERSION:-latest}
      DD_LOGS_INJECTION: "true"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${AGENTIC_PORT:-4318}:4318"
    restart: unless-stopped
    labels:
      com.datadoghq.ad.logs: '[{"source":"nodejs","service":"estatewise-agentic-ai"}]'
    networks:
      - estatewise

  redis:
    image: redis:7-alpine
    profiles: ["agentic"]
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - estatewise

  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      DD_API_KEY: ${DD_API_KEY:-}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_APM_ENABLED: "true"
      DD_APM_NON_LOCAL_TRAFFIC: "true"
      DD_LOGS_ENABLED: "true"
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: "true"
      DD_PROCESS_AGENT_ENABLED: "true"
      DD_DOGSTATSD_NON_LOCAL_TRAFFIC: "true"
      DD_CONTAINER_EXCLUDE: "name:datadog-agent"
      DD_TAGS: "env:production team:estatewise service:estatewise"
      DD_AC_EXCLUDE: "name:datadog-agent"
      DD_DOCKER_LABELS_AS_TAGS: '{"com.docker.compose.service":"compose_service"}'
      DD_DOCKER_ENV_AS_TAGS: '{"NODE_ENV":"node_env"}'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /opt/datadog-agent/run:/opt/datadog-agent/run:rw
      - datadog-data:/var/lib/datadog-agent
    ports:
      - "${DD_DOGSTATSD_PORT:-8125}:8125/udp"
      - "${DD_APM_PORT:-8126}:8126/tcp"
    healthcheck:
      test: ["CMD-SHELL", "agent health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      com.datadoghq.ad.logs: '[{"source":"datadog-agent","service":"datadog"}]'
    networks:
      - estatewise

  neo4j:
    image: neo4j:5.22
    profiles: ["graph"]
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4jpassword}
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
      NEO4J_server_bolt_advertised__address: "neo4j:7687"
      NEO4J_server_http_advertised__address: "neo4j:7474"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    networks:
      - estatewise

networks:
  estatewise:
    driver: bridge

volumes:
  mongo-data:
  neo4j-data:
  neo4j-logs:
  redis-data:
  datadog-data:
