# =============================================================================
# Docker Compose — SonarQube Local Server
# =============================================================================
# Spins up a self-hosted SonarQube Community instance for local code analysis.
#
# Usage:
#   docker compose -f docker/compose.sonarqube.yml up -d
#   make sonar-up        # via Makefile
#
# Access:  http://localhost:9000  (default admin/admin — change on first login)
# Scanner: make sonar             # runs sonar-scanner against this instance
# =============================================================================

services:
  sonarqube:
    image: sonarqube:10-community
    container_name: estatewise-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    depends_on:
      sonarqube-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - sonar-net

  sonarqube-db:
    image: postgres:16-alpine
    container_name: estatewise-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sonar-net

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  sonarqube_pgdata:

networks:
  sonar-net:
    driver: bridge
