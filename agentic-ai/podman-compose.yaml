# Podman Compose — Agentic AI Orchestrator
# Usage: podman-compose up --build
# Or with podman compose plugin: podman compose up --build
#
# Functionally identical to docker-compose.yaml.
# Podman reads Dockerfile natively; no Containerfile alias needed.

services:
  agentic-ai:
    build:
      context: ..
      dockerfile: agentic-ai/Dockerfile
    image: ghcr.io/your-org/estatewise-agentic:latest
    environment:
      AGENT_RUNTIME: ${AGENT_RUNTIME:-langgraph}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PINECONE_API_KEY: ${PINECONE_API_KEY}
      PINECONE_INDEX: ${PINECONE_INDEX:-estatewise-index}
      THREAD_ID: ${THREAD_ID:-}
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-}
      LANGSMITH_ENABLED: ${LANGSMITH_ENABLED:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-estatewise-agentic-ai}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      LANGSMITH_RUN_TAGS: ${LANGSMITH_RUN_TAGS:-estatewise,agentic-ai}
      LANGSMITH_STRICT: ${LANGSMITH_STRICT:-false}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DAILY_BUDGET_USD: ${DAILY_BUDGET_USD:-10}
      MONTHLY_BUDGET_USD: ${MONTHLY_BUDGET_USD:-200}
      PER_REQUEST_MAX_USD: ${PER_REQUEST_MAX_USD:-0.50}
      DEFAULT_AGENT_TIMEOUT_MS: ${DEFAULT_AGENT_TIMEOUT_MS:-60000}
      MAX_AGENT_ITERATIONS: ${MAX_AGENT_ITERATIONS:-10}
      MAX_CONCURRENT_AGENTS: ${MAX_CONCURRENT_AGENTS:-3}
    tty: true
    stdin_open: true
    command: ["--langgraph"]
