apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-ai-config
  namespace: estatewise
  labels:
    app: estatewise-agentic
  annotations:
    consul.hashicorp.com/connect-inject: "true"
data:
  AGENT_RUNTIME: "langgraph"
  PINECONE_INDEX: "estatewise-index"
  LANGSMITH_ENABLED: "false"
  LANGSMITH_PROJECT: "estatewise-agentic-ai"
  LANGSMITH_RUN_TAGS: "estatewise,agentic-ai,k8s"
